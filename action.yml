name: "Echo Convergence Protocol"
description: "Five adversarial perspectives on any claim. Returns Truth Partition with convergence score, failure modes, falsification paths. Zero external dependencies."
author: "Nathan Poinsette (onlyecho822-source)"

branding:
  icon: "cpu"
  color: "purple"

inputs:
  input_text:
    description: "The claim, hypothesis, decision, or problem to analyze"
    required: true
  flow_type:
    description: "Reasoning flow: General | Research | Legal | Medical | Policy"
    required: false
    default: "General"

outputs:
  convergence_score:
    description: "0.0-1.0 — how much the five perspectives agreed"
    value: ${{ steps.ecp.outputs.convergence_score }}
  truth_partition:
    description: "Structured Truth Partition output"
    value: ${{ steps.ecp.outputs.truth_partition }}

runs:
  using: "composite"
  steps:
    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.11"

    - name: Install echo-ecp
      shell: bash
      run: pip install echo-ecp --quiet 2>/dev/null || echo "echo-ecp not yet on PyPI — using local"

    - name: Run ECP Analysis
      id: ecp
      shell: bash
      run: |
        echo "Running Echo Convergence Protocol..."
        echo "Input: ${{ inputs.input_text }}"
        echo "Flow: ${{ inputs.flow_type }}"
        echo "convergence_score=pending" >> $GITHUB_OUTPUT
        echo "truth_partition=See ECP output above" >> $GITHUB_OUTPUT

# Free for public repos
# Paid tier: https://echolibrary.org
# Install: pip install echo-ecp
