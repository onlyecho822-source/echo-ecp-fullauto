name: "Echo Convergence Protocol"
description: "Run any input through five adversarial reasoning perspectives. Returns structured Truth Partition with convergence score, failure modes, and falsification paths."
author: "Nathan Poinsette (onlyecho822-source)"

branding:
  icon: "cpu"
  color: "purple"

inputs:
  input_text:
    description: "The claim, hypothesis, decision, or problem to analyze"
    required: true
  flow_type:
    description: "Reasoning flow: General | Research | Legal | Medical | Policy"
    required: false
    default: "General"
  output_format:
    description: "Output format: json | markdown | plain"
    required: false
    default: "markdown"

outputs:
  truth_partition:
    description: "Structured Truth Partition — verified claims, unverified claims, false claims, unknowns"
  convergence_score:
    description: "0.0–1.0 — how much the five perspectives agreed"
  failure_modes:
    description: "What conditions would make this analysis wrong"
  falsification_paths:
    description: "What evidence would falsify the conclusion"

runs:
  using: "docker"
  image: "Dockerfile"

