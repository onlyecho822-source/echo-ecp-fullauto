name: Publish to PyPI
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type PUBLISH to confirm"
        required: true
        default: ""
jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.confirm == 'PUBLISH')
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build tools
        run: pip install build twine --break-system-packages --quiet
      - name: Fix build backend compatibility
        run: |
          sed -i 's|build-backend = "setuptools.backends.legacy:build"|build-backend = "setuptools.build_meta"|g' pyproject.toml || true
      - name: Build package
        run: python -m build
      - name: Check dist
        run: twine check dist/*
      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/* --skip-existing --verbose
