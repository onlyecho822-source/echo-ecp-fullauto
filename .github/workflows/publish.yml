name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type PUBLISH to confirm"
        required: true
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install build tools
        run: pip install build twine --quiet
      - name: Fix build backend
        run: |
          sed -i 's|build-backend = "setuptools.backends.legacy:build"|build-backend = "setuptools.build_meta"|g' pyproject.toml || true
      - name: Build
        run: python -m build
      - name: Check
        run: twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist-echo-ecp
          path: dist/

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.confirm == 'PUBLISH')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-echo-ecp
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
          verbose: true

# Uses PYPI_API_TOKEN secret (set 2026-04-04)
