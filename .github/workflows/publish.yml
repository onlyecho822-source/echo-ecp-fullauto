name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type PUBLISH to confirm PyPI upload"
        required: true
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build twine --quiet

      - name: Build package
        run: python -m build

      - name: Check dist
        run: twine check dist/*

      - name: Show what will be uploaded
        run: ls -la dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-echo-ecp
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.confirm == 'PUBLISH')
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build twine --quiet

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          verbose: true

# To publish manually:
# 1. Go to Actions tab → "Publish to PyPI" → Run workflow
# 2. Type PUBLISH in the confirm box
# 3. Click Run
#
# Requires: PYPI_API_TOKEN secret set in repo Settings → Secrets → Actions
# Get token at: https://pypi.org/manage/account/token/
