name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # Call reusable CI from echo-kraken-brain
  ci:
    uses: onlyecho822-source/echo-kraken-brain/.github/workflows/reusable-python-ci.yml@main
    with:
      python-version: '3.11'
      run-tests: true
      test-dir: 'tests'

  # Also run docs check
  docs:
    uses: onlyecho822-source/echo-kraken-brain/.github/workflows/reusable-docs-check.yml@main

