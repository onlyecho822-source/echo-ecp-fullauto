name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  health:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate package imports
        run: python -c "import sys; print('Python', sys.version)"

      - name: Validate docs
        run: |
          for f in docs/WHITE_PAPER.md docs/ARCHITECTURE.md docs/ECOSYSTEM_CONNECTION.md; do
            [ -f "$f" ] && echo "OK $f" || echo "MISSING $f"
          done

      - name: Validate Python syntax
        run: |
          python - << 'PYEOF'
          import ast, os, sys
          errors = []
          skip = {'.git','venv','.venv','node_modules','__pycache__'}
          for root, dirs, files in os.walk('.'):
            dirs[:] = [d for d in dirs if d not in skip]
            for f in files:
              if f.endswith('.py'):
                p = os.path.join(root, f)
                try:
                  ast.parse(open(p).read())
                except SyntaxError as e:
                  errors.append(f'{p}: {e}')
          if errors:
            [print(e) for e in errors]
            sys.exit(1)
          print(f'Syntax OK: {sum(1 for _,_,fs in os.walk(".") for f in fs if f.endswith(".py"))} files')
          PYEOF

# Minimal green CI — validates structure and syntax
# Echo Universe · ECS v1.1-hardened · ∇θ
