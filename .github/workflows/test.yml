name: ECP Test Suite

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you running tests?"
        required: false
        default: "Pre-commit verification"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run v3.1 gate tests
        run: python tests/test_gate.py
      - name: Run v3.1 convergence tests
        run: python tests/test_convergence.py
      - name: Run v3.1 partition tests
        run: python tests/test_partition.py
      - name: Run v4.0 tests
        run: python tests/test_v4.py
      - name: Summary
        run: |
          echo "## ECP Test Suite Complete" >> $GITHUB_STEP_SUMMARY
          echo "v3.1 and v4.0 tests passed." >> $GITHUB_STEP_SUMMARY
