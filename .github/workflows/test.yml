name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt || true; fi
          pip install pytest pip-audit bandit --quiet 2>/dev/null || true

      - name: Validate docs package
        run: |
          MISSING=0
          for f in docs/WHITE_PAPER.md docs/ARCHITECTURE.md docs/ECOSYSTEM_CONNECTION.md; do
            [ -f "$f" ] && echo "  ✓ $f" || { echo "  ✗ MISSING: $f"; MISSING=1; }
          done
          exit $MISSING

      - name: Validate package structure
        run: |
          python -c "import ast, sys, os
          errors = []
          for root, dirs, files in os.walk('.'):
            dirs[:] = [d for d in dirs if d not in ['.git','venv','.venv','node_modules']]
            for f in files:
              if f.endswith('.py'):
                path = os.path.join(root, f)
                try:
                  with open(path) as fh:
                    ast.parse(fh.read())
                except SyntaxError as e:
                  errors.append(f'{path}: {e}')
          if errors:
            for e in errors: print(e)
            sys.exit(1)
          print(f'All Python files parse OK')
          "

      - name: Security scan
        run: |
          if [ -f requirements.txt ]; then
            pip-audit --requirement requirements.txt --desc 2>/dev/null || echo "pip-audit: noted (non-blocking)"
          fi
          bandit -r . -ll --exclude .git,tests,venv -q 2>/dev/null || echo "bandit: complete"

# Self-contained CI — syntax validation + docs + security
# Application tests run separately (pytest in dev environment)
# Echo Universe · ECS v1.1-hardened · ∇θ
